<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quillpad</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #161616;
      --sidebar: #131313;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #555;
      --muted2: #888;
      --accent: #7c6af7;
      --accent-hover: #9180ff;
      --btn-bg: #222;
      --btn-hover: #2c2c2c;
      --item-hover: #1e1e1e;
      --item-active: #242236;
      --folder-active: #1d1c2e;
    }
    [data-theme="light"] {
      --bg: #f0efee; --surface: #ffffff; --sidebar: #e8e7e6; --border: #d8d7d6;
      --text: #1c1b1a; --muted: #bbb; --muted2: #888; --accent: #6254e8;
      --accent-hover: #7060f5; --btn-bg: #ececec; --btn-hover: #e3e2e1;
      --item-hover: #e2e1e0; --item-active: #dddaf8; --folder-active: #e0ddf5;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* ── Layout ── */
    .layout { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 230px; min-width: 230px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      transition: width 0.22s ease, min-width 0.22s ease, border-color 0.22s ease;
      overflow: hidden;
    }
    .sidebar.collapsed { width: 0; min-width: 0; border-right-color: transparent; }

    .sidebar-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 10px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .wordmark { display: flex; align-items: center; gap: 7px; }
    .wordmark svg { color: var(--accent); flex-shrink: 0; }
    .wordmark span { font-size: 1rem; font-weight: 700; letter-spacing: -0.3px; white-space: nowrap; }
    .sidebar-actions { display: flex; gap: 2px; }
    .sb-btn {
      background: none; border: none; cursor: pointer; color: var(--muted2);
      padding: 5px; border-radius: 6px; display: flex; align-items: center;
      transition: color 0.15s, background 0.15s;
    }
    .sb-btn:hover { color: var(--accent); background: var(--btn-hover); }

    /* ── Tree ── */
    .tree { flex: 1; overflow-y: auto; padding: 4px 0 10px; }
    .tree::-webkit-scrollbar { width: 4px; }
    .tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Folder */
    .folder-wrap { }
    .folder-row {
      display: flex; align-items: center; gap: 0;
      padding: 5px 8px 5px 6px; margin: 1px 5px;
      border-radius: 6px; cursor: pointer;
      transition: background 0.12s; position: relative;
    }
    .folder-row:hover { background: var(--item-hover); }
    .folder-row.active-folder { background: var(--folder-active); }

    .chevron {
      flex-shrink: 0; display: flex; align-items: center;
      color: var(--muted); margin-right: 3px; transition: transform 0.18s;
    }
    .folder-wrap.open .chevron { transform: rotate(90deg); }

    .folder-icon { flex-shrink: 0; margin-right: 5px; color: var(--accent); opacity: 0.75; }
    .folder-row.active-folder .folder-icon { opacity: 1; }

    .folder-name-text {
      flex: 1; font-size: 0.8rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      min-width: 0;
    }
    .folder-name-input {
      flex: 1; background: var(--btn-bg); border: 1px solid var(--accent);
      border-radius: 4px; color: var(--text); font-size: 0.8rem; font-weight: 600;
      padding: 1px 5px; outline: none; min-width: 0;
    }

    .folder-row-actions { display: flex; gap: 1px; flex-shrink: 0; opacity: 0; transition: opacity 0.12s; }
    .folder-row:hover .folder-row-actions { opacity: 1; }
    .row-btn {
      background: none; border: none; cursor: pointer; color: var(--muted2);
      padding: 2px 3px; border-radius: 4px; display: flex; align-items: center;
      transition: color 0.12s, background 0.12s;
    }
    .row-btn:hover { color: var(--text); background: var(--btn-hover); }
    .row-btn.danger:hover { color: #e05c5c; background: rgba(224,92,92,0.12); }

    /* Folder children */
    .folder-children { overflow: hidden; max-height: 0; transition: max-height 0.2s ease; }
    .folder-wrap.open .folder-children { max-height: 2000px; }

    /* Note item */
    .note-item {
      display: flex; align-items: center;
      padding: 6px 8px 6px 10px; margin: 1px 5px;
      border-radius: 6px; cursor: pointer; min-width: 0;
      transition: background 0.12s; position: relative;
    }
    .note-item.indented { padding-left: 28px; }
    .note-item:hover { background: var(--item-hover); }
    .note-item.active { background: var(--item-active); }

    .note-file-icon { flex-shrink: 0; margin-right: 6px; color: var(--muted2); }
    .note-item.active .note-file-icon { color: var(--accent); }

    .note-item-body { flex: 1; min-width: 0; }
    .note-item-title {
      font-size: 0.8rem; font-weight: 600; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; color: var(--text);
    }
    .note-item.active .note-item-title { color: var(--accent); }
    .note-item-date { font-size: 0.65rem; color: var(--muted); margin-top: 1px; }

    .note-item-actions { display: flex; gap: 1px; flex-shrink: 0; opacity: 0; transition: opacity 0.12s; }
    .note-item:hover .note-item-actions { opacity: 1; }

    /* Section label (Unfiled) */
    .section-label {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted); padding: 10px 13px 3px;
    }

    .sidebar-empty { padding: 20px 14px; font-size: 0.78rem; color: var(--muted2); text-align: center; }

    /* ── Context menu ── */
    .ctx-menu {
      position: fixed; z-index: 200;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 9px; padding: 5px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      min-width: 170px; display: none;
    }
    .ctx-menu.visible { display: block; }
    .ctx-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: 6px; cursor: pointer;
      font-size: 0.82rem; color: var(--text);
      transition: background 0.1s;
    }
    .ctx-item:hover { background: var(--item-hover); }
    .ctx-item.danger { color: #e05c5c; }
    .ctx-item.danger:hover { background: rgba(224,92,92,0.1); }
    .ctx-item svg { flex-shrink: 0; color: var(--muted2); }
    .ctx-item.danger svg { color: #e05c5c; }
    .ctx-separator { height: 1px; background: var(--border); margin: 4px 0; }
    .ctx-section-title { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 5px 10px 2px; }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

    header { display: flex; align-items: center; padding: 13px 20px 11px; border-bottom: 1px solid var(--border); gap: 10px; }

    .sidebar-toggle {
      background: none; border: none; cursor: pointer; color: var(--muted2);
      padding: 5px; border-radius: 6px; display: flex; align-items: center; flex-shrink: 0;
      transition: color 0.15s, background 0.15s;
    }
    .sidebar-toggle:hover { color: var(--text); background: var(--btn-hover); }

    .title-input {
      flex: 1; background: transparent; border: none; outline: none;
      font-size: 0.95rem; color: var(--text); font-weight: 600; min-width: 0;
    }
    .title-input::placeholder { color: var(--muted); font-weight: 400; }

    .header-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .icon-btn {
      background: none; border: none; cursor: pointer; color: var(--muted2);
      padding: 6px; border-radius: 8px; display: flex; align-items: center;
      transition: color 0.15s, background 0.15s;
    }
    .icon-btn:hover { color: var(--text); background: var(--btn-hover); }

    .toolbar {
      display: flex; align-items: center; gap: 4px;
      padding: 7px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    .toolbar-btn {
      background: none; border: none; cursor: pointer; color: var(--muted2);
      padding: 5px 8px; border-radius: 6px; font-size: 0.8rem; font-weight: 600;
      transition: color 0.15s, background 0.15s; display: flex; align-items: center; gap: 4px;
    }
    .toolbar-btn:hover { color: var(--text); background: var(--btn-hover); }
    .toolbar-divider { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
    select.font-select {
      background: none; border: none; color: var(--muted2); font-size: 0.8rem;
      cursor: pointer; padding: 5px 6px; border-radius: 6px; outline: none;
      appearance: none; -webkit-appearance: none;
    }
    select.font-select:hover { color: var(--text); background: var(--btn-hover); }

    .editor-wrap { flex: 1; overflow: hidden; padding: 20px 20px 0; }
    #editor {
      width: 100%; height: 100%; background: transparent; border: none;
      outline: none; resize: none; color: var(--text); font-size: 1rem;
      line-height: 1.75; padding: 0; caret-color: var(--accent);
    }
    #editor::placeholder { color: var(--muted); }

    footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 20px 16px; border-top: 1px solid var(--border); gap: 12px; flex-wrap: wrap;
    }
    .stats { font-size: 0.72rem; color: var(--muted2); }
    .download-group { display: flex; gap: 8px; }
    .dl-btn {
      display: flex; align-items: center; gap: 6px; padding: 7px 13px;
      border: 1px solid var(--border); border-radius: 8px; background: var(--btn-bg);
      color: var(--text); font-size: 0.78rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .dl-btn:hover { background: var(--btn-hover); border-color: var(--accent); transform: translateY(-1px); }
    .dl-btn:active { transform: translateY(0); }
    .dl-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .dl-btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 10px 18px; border-radius: 10px; font-size: 0.85rem;
      opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 300;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Drag-over highlight ── */
    .folder-row.drag-over { background: var(--folder-active) !important; outline: 1.5px dashed var(--accent); }
    .note-item { user-select: none; }

    @media (max-width: 600px) {
      .sidebar { position: fixed; top: 0; left: 0; height: 100vh; z-index: 50; transform: translateX(0); width: 240px; min-width: 240px; }
      .sidebar.collapsed { transform: translateX(-100%); width: 240px; min-width: 240px; }
      .dl-btn span { display: none; }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="wordmark">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        <span>Quillpad</span>
      </div>
      <div class="sidebar-actions">
        <button class="sb-btn" id="newFolderBtn" title="New folder">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            <line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/>
          </svg>
        </button>
        <button class="sb-btn" id="newNoteBtn" title="New note">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="tree" id="tree"></div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header>
      <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
      </button>
      <input class="title-input" id="noteTitle" type="text" placeholder="Untitled note…" maxlength="80" />
      <div class="header-actions">
        <button class="icon-btn" id="themeToggle" title="Toggle theme">
          <svg id="themeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <button class="icon-btn" id="clearBtn" title="Delete this note">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="toolbar">
      <select class="font-select" id="fontSelect">
        <option value="sans">Sans-serif</option>
        <option value="serif">Serif</option>
        <option value="mono">Monospace</option>
      </select>
      <div class="toolbar-divider"></div>
      <button class="toolbar-btn" title="Bold (⌘B)" onclick="wrapSelection('**','**')"><b>B</b></button>
      <button class="toolbar-btn" title="Italic (⌘I)" onclick="wrapSelection('_','_')"><i>I</i></button>
      <button class="toolbar-btn" title="Code" onclick="wrapSelection('`','`')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      </button>
      <div class="toolbar-divider"></div>
      <button class="toolbar-btn" onclick="insertPrefix('# ')">H1</button>
      <button class="toolbar-btn" onclick="insertPrefix('## ')">H2</button>
      <button class="toolbar-btn" onclick="insertPrefix('### ')">H3</button>
      <div class="toolbar-divider"></div>
      <button class="toolbar-btn" onclick="insertPrefix('- ')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        List
      </button>
      <button class="toolbar-btn" onclick="insertPrefix('> ')">Quote</button>
      <button class="toolbar-btn" onclick="insertPrefix('- [ ] ')">Task</button>
    </div>

    <div class="editor-wrap">
      <textarea id="editor" placeholder="Start writing…" spellcheck="true" autofocus></textarea>
    </div>

    <footer>
      <div class="stats" id="stats">0 words · 0 chars</div>
      <div class="download-group">
        <button class="dl-btn" onclick="downloadAs('txt')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>.TXT</span>
        </button>
        <button class="dl-btn" onclick="downloadAs('md')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>.MD</span>
        </button>
        <button class="dl-btn primary" onclick="downloadAs('pdf')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>.PDF</span>
        </button>
      </div>
    </footer>
  </div>
</div>

<!-- Context menu -->
<div class="ctx-menu" id="ctxMenu"></div>
<div class="toast" id="toast"></div>

<script>
  // ── DOM refs ─────────────────────────────────────────────
  const editor   = document.getElementById('editor');
  const statsEl  = document.getElementById('stats');
  const titleEl  = document.getElementById('noteTitle');
  const toastEl  = document.getElementById('toast');
  const treeEl   = document.getElementById('tree');
  const sidebar  = document.getElementById('sidebar');
  const ctxMenu  = document.getElementById('ctxMenu');

  const FONTS = {
    sans:  '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
    serif: 'Georgia, "Times New Roman", serif',
    mono:  '"SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace'
  };

  // ── State ─────────────────────────────────────────────────
  let activeFolderId = null; // folder context for new notes

  // ── Storage ───────────────────────────────────────────────
  const loadNotes   = () => { try { return JSON.parse(localStorage.getItem('quillpad_notes'))   || []; } catch { return []; } };
  const loadFolders = () => { try { return JSON.parse(localStorage.getItem('quillpad_folders')) || []; } catch { return []; } };
  const saveNotes   = n  => localStorage.setItem('quillpad_notes',   JSON.stringify(n));
  const saveFolders = f  => localStorage.setItem('quillpad_folders', JSON.stringify(f));
  const getActiveId = () => localStorage.getItem('quillpad_activeId');
  const setActiveId = id => localStorage.setItem('quillpad_activeId', id);
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

  // ── Tree render ───────────────────────────────────────────
  function renderTree() {
    const notes    = loadNotes();
    const folders  = loadFolders();
    const activeId = getActiveId();
    treeEl.innerHTML = '';

    if (!notes.length && !folders.length) {
      treeEl.innerHTML = '<div class="sidebar-empty">No notes yet.<br>Hit + to get started.</div>';
      return;
    }

    // Render folders
    folders.forEach(folder => {
      const folderNotes = notes
        .filter(n => n.folderId === folder.id)
        .sort((a, b) => b.updatedAt - a.updatedAt);

      const wrap = document.createElement('div');
      wrap.className = 'folder-wrap' + (folder.collapsed ? '' : ' open');
      wrap.dataset.folderId = folder.id;

      // Folder row
      const row = document.createElement('div');
      row.className = 'folder-row' + (activeFolderId === folder.id ? ' active-folder' : '');
      row.dataset.folderId = folder.id;
      row.innerHTML = `
        <span class="chevron">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </span>
        <span class="folder-icon">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </span>
        <span class="folder-name-text">${escHtml(folder.name || 'Untitled Folder')}</span>
        <span class="folder-row-actions">
          <button class="row-btn" data-action="rename-folder" data-id="${folder.id}" title="Rename">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="row-btn danger" data-action="delete-folder" data-id="${folder.id}" title="Delete folder">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </span>`;

      // Toggle expand
      row.addEventListener('click', e => {
        if (e.target.closest('[data-action]')) return;
        activeFolderId = folder.id;
        wrap.classList.toggle('open');
        const folders2 = loadFolders();
        const fi = folders2.findIndex(f => f.id === folder.id);
        if (fi !== -1) { folders2[fi].collapsed = !wrap.classList.contains('open'); saveFolders(folders2); }
        renderTree();
      });

      // Rename button
      row.querySelector('[data-action="rename-folder"]').addEventListener('click', e => {
        e.stopPropagation(); startFolderRename(folder.id, row);
      });

      // Delete button
      row.querySelector('[data-action="delete-folder"]').addEventListener('click', e => {
        e.stopPropagation(); deleteFolder(folder.id);
      });

      // Right-click
      row.addEventListener('contextmenu', e => { e.preventDefault(); showFolderCtx(e, folder.id); });

      // Drag-over for dropping notes
      row.addEventListener('dragover', e => { e.preventDefault(); row.classList.add('drag-over'); });
      row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
      row.addEventListener('drop', e => {
        e.preventDefault(); row.classList.remove('drag-over');
        const noteId = e.dataTransfer.getData('noteId');
        if (noteId) moveNoteToFolder(noteId, folder.id);
      });

      // Double-click name to rename
      row.querySelector('.folder-name-text').addEventListener('dblclick', e => {
        e.stopPropagation(); startFolderRename(folder.id, row);
      });

      wrap.appendChild(row);

      // Children
      const children = document.createElement('div');
      children.className = 'folder-children';
      folderNotes.forEach(note => children.appendChild(buildNoteItem(note, true, activeId)));
      wrap.appendChild(children);

      treeEl.appendChild(wrap);
    });

    // Unfiled notes
    const unfiled = notes
      .filter(n => !n.folderId)
      .sort((a, b) => b.updatedAt - a.updatedAt);

    if (unfiled.length > 0) {
      if (folders.length > 0) {
        const lbl = document.createElement('div');
        lbl.className = 'section-label';
        lbl.textContent = 'Unfiled';
        treeEl.appendChild(lbl);
      }
      unfiled.forEach(note => treeEl.appendChild(buildNoteItem(note, false, activeId)));
    }
  }

  function buildNoteItem(note, indented, activeId) {
    const item = document.createElement('div');
    item.className = 'note-item' + (indented ? ' indented' : '') + (note.id === activeId ? ' active' : '');
    item.dataset.noteId = note.id;
    item.draggable = true;

    item.innerHTML = `
      <span class="note-file-icon">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </span>
      <div class="note-item-body">
        <div class="note-item-title">${escHtml(note.title || 'Untitled note')}</div>
        <div class="note-item-date">${formatDate(note.updatedAt)}</div>
      </div>
      <span class="note-item-actions">
        <button class="row-btn danger" data-action="delete-note" data-id="${note.id}" title="Delete note">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </span>`;

    item.addEventListener('click', e => {
      if (e.target.closest('[data-action]')) return;
      switchNote(note.id);
    });

    item.querySelector('[data-action="delete-note"]').addEventListener('click', e => {
      e.stopPropagation(); deleteNote(note.id);
    });

    item.addEventListener('contextmenu', e => { e.preventDefault(); showNoteCtx(e, note.id); });

    // Drag
    item.addEventListener('dragstart', e => {
      e.dataTransfer.setData('noteId', note.id);
      item.style.opacity = '0.5';
    });
    item.addEventListener('dragend', () => { item.style.opacity = ''; });

    return item;
  }

  // ── Inline folder rename ──────────────────────────────────
  function startFolderRename(folderId, row) {
    const nameEl = row.querySelector('.folder-name-text');
    const folders = loadFolders();
    const folder = folders.find(f => f.id === folderId);
    if (!folder) return;

    const input = document.createElement('input');
    input.className = 'folder-name-input';
    input.value = folder.name;
    nameEl.replaceWith(input);
    input.focus(); input.select();

    const commit = () => {
      const val = input.value.trim() || 'Untitled Folder';
      const fs = loadFolders();
      const fi = fs.findIndex(f => f.id === folderId);
      if (fi !== -1) { fs[fi].name = val; saveFolders(fs); }
      renderTree();
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { renderTree(); }
    });
  }

  // ── Context menus ─────────────────────────────────────────
  function showNoteCtx(e, noteId) {
    const folders = loadFolders();
    const notes   = loadNotes();
    const note    = notes.find(n => n.id === noteId);
    if (!note) return;

    let html = '';

    if (folders.length) {
      html += `<div class="ctx-section-title">Move to folder</div>`;
      if (note.folderId) {
        html += `<div class="ctx-item" data-action="move" data-note="${noteId}" data-folder="">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Remove from folder</div>`;
      }
      folders.forEach(f => {
        const active = note.folderId === f.id;
        html += `<div class="ctx-item${active ? ' active' : ''}" data-action="move" data-note="${noteId}" data-folder="${f.id}">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          ${escHtml(f.name)}${active ? ' ✓' : ''}</div>`;
      });
      html += `<div class="ctx-separator"></div>`;
    }

    html += `<div class="ctx-item danger" data-action="delete-note-ctx" data-id="${noteId}">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      Delete note</div>`;

    openCtxMenu(e.clientX, e.clientY, html);
  }

  function showFolderCtx(e, folderId) {
    const html = `
      <div class="ctx-item" data-action="new-note-in" data-folder="${folderId}">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New note here</div>
      <div class="ctx-item" data-action="rename-folder-ctx" data-id="${folderId}">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Rename</div>
      <div class="ctx-separator"></div>
      <div class="ctx-item danger" data-action="delete-folder-ctx" data-id="${folderId}">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Delete folder</div>`;
    openCtxMenu(e.clientX, e.clientY, html);
  }

  function openCtxMenu(x, y, html) {
    ctxMenu.innerHTML = html;
    ctxMenu.classList.add('visible');

    // Position
    const vw = window.innerWidth, vh = window.innerHeight;
    ctxMenu.style.left = '0'; ctxMenu.style.top = '0';
    const w = ctxMenu.offsetWidth, h = ctxMenu.offsetHeight;
    ctxMenu.style.left = Math.min(x, vw - w - 8) + 'px';
    ctxMenu.style.top  = Math.min(y, vh - h - 8) + 'px';

    ctxMenu.querySelectorAll('.ctx-item').forEach(item => {
      item.addEventListener('click', e => {
        e.stopPropagation();
        const action = item.dataset.action;
        if (action === 'move')              moveNoteToFolder(item.dataset.note, item.dataset.folder || null);
        if (action === 'delete-note-ctx')   deleteNote(item.dataset.id);
        if (action === 'rename-folder-ctx') { closeCtxMenu(); const row = treeEl.querySelector(`.folder-row[data-folder-id="${item.dataset.id}"]`); if (row) startFolderRename(item.dataset.id, row); }
        if (action === 'delete-folder-ctx') deleteFolder(item.dataset.id);
        if (action === 'new-note-in')       newNoteInFolder(item.dataset.folder);
        closeCtxMenu();
      });
    });
  }

  function closeCtxMenu() { ctxMenu.classList.remove('visible'); }
  document.addEventListener('click', closeCtxMenu);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCtxMenu(); });

  // ── Folder CRUD ───────────────────────────────────────────
  document.getElementById('newFolderBtn').addEventListener('click', () => {
    const folder = { id: uid(), name: 'New Folder', collapsed: false };
    const folders = loadFolders();
    folders.push(folder);
    saveFolders(folders);
    activeFolderId = folder.id;
    renderTree();
    // Auto-start rename
    setTimeout(() => {
      const row = treeEl.querySelector(`.folder-row[data-folder-id="${folder.id}"]`) ||
                  [...treeEl.querySelectorAll('.folder-row')].find(r => r.dataset.folderId === folder.id);
      if (row) startFolderRename(folder.id, row);
    }, 50);
  });

  function deleteFolder(folderId) {
    if (!confirm('Delete folder? Notes inside will be moved to Unfiled.')) return;
    const folders = loadFolders();
    saveFolders(folders.filter(f => f.id !== folderId));
    // Move notes to unfiled
    const notes = loadNotes();
    notes.forEach(n => { if (n.folderId === folderId) n.folderId = null; });
    saveNotes(notes);
    if (activeFolderId === folderId) activeFolderId = null;
    renderTree();
    showToast('Folder deleted, notes moved to Unfiled.');
  }

  function moveNoteToFolder(noteId, folderId) {
    const notes = loadNotes();
    const idx = notes.findIndex(n => n.id === noteId);
    if (idx === -1) return;
    notes[idx].folderId = folderId || null;
    saveNotes(notes);
    // Auto-open destination folder
    if (folderId) {
      const folders = loadFolders();
      const fi = folders.findIndex(f => f.id === folderId);
      if (fi !== -1) { folders[fi].collapsed = false; saveFolders(folders); }
    }
    renderTree();
    showToast(folderId ? 'Note moved.' : 'Note moved to Unfiled.');
  }

  // ── Note CRUD ─────────────────────────────────────────────
  function newNoteInFolder(folderId) {
    const note = { id: uid(), title: '', content: '', folderId: folderId || null, updatedAt: Date.now() };
    const notes = loadNotes();
    notes.unshift(note);
    saveNotes(notes);
    // Ensure folder is open
    if (folderId) {
      const folders = loadFolders();
      const fi = folders.findIndex(f => f.id === folderId);
      if (fi !== -1 && folders[fi].collapsed) { folders[fi].collapsed = false; saveFolders(folders); }
    }
    switchNote(note.id);
  }

  document.getElementById('newNoteBtn').addEventListener('click', () => {
    newNoteInFolder(activeFolderId);
  });

  function switchNote(id) {
    setActiveId(id);
    const note = loadNotes().find(n => n.id === id);
    if (!note) return;
    titleEl.value  = note.title;
    editor.value   = note.content;
    activeFolderId = note.folderId || null;
    updateStats();
    renderTree();
    editor.focus();
    if (window.innerWidth <= 600) sidebar.classList.add('collapsed');
  }

  function saveActive() {
    const id = getActiveId(); if (!id) return;
    const notes = loadNotes();
    const idx = notes.findIndex(n => n.id === id); if (idx === -1) return;
    notes[idx].title     = titleEl.value;
    notes[idx].content   = editor.value;
    notes[idx].updatedAt = Date.now();
    saveNotes(notes);
    renderTree();
  }

  editor.addEventListener('input',  () => { updateStats(); saveActive(); });
  titleEl.addEventListener('input', saveActive);

  function deleteNote(id) {
    let notes = loadNotes();
    if (notes.length === 1) {
      const fresh = { id: uid(), title: '', content: '', folderId: null, updatedAt: Date.now() };
      saveNotes([fresh]); switchNote(fresh.id); showToast('Note cleared.'); return;
    }
    notes = notes.filter(n => n.id !== id); saveNotes(notes);
    if (getActiveId() === id) {
      const sorted = [...notes].sort((a, b) => b.updatedAt - a.updatedAt);
      switchNote(sorted[0].id);
    } else { renderTree(); }
    showToast('Note deleted.');
  }

  document.getElementById('clearBtn').addEventListener('click', () => {
    const id = getActiveId(); if (!id) return;
    const note = loadNotes().find(n => n.id === id);
    if ((note?.title || note?.content) && !confirm('Delete this note?')) return;
    deleteNote(id);
  });

  // ── Sidebar toggle ────────────────────────────────────────
  document.getElementById('sidebarToggle').addEventListener('click', () => {
    sidebar.classList.toggle('collapsed');
  });

  // ── Stats ─────────────────────────────────────────────────
  function updateStats() {
    const text = editor.value.trim();
    const words = text ? text.split(/\s+/).length : 0;
    statsEl.textContent = `${words.toLocaleString()} word${words !== 1 ? 's' : ''} · ${editor.value.length.toLocaleString()} chars`;
  }

  // ── Font ──────────────────────────────────────────────────
  document.getElementById('fontSelect').addEventListener('change', e => {
    editor.style.fontFamily = FONTS[e.target.value];
    localStorage.setItem('quillpad_font', e.target.value);
  });

  // ── Theme ─────────────────────────────────────────────────
  document.getElementById('themeToggle').addEventListener('click', () => {
    const next = document.body.dataset.theme === 'light' ? 'dark' : 'light';
    document.body.dataset.theme = next;
    localStorage.setItem('quillpad_theme', next);
    updateThemeIcon(next);
  });
  function updateThemeIcon(theme) {
    document.getElementById('themeIcon').innerHTML = theme === 'light'
      ? `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`
      : `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
  }

  // ── Markdown helpers ──────────────────────────────────────
  function wrapSelection(before, after) {
    const s = editor.selectionStart, e2 = editor.selectionEnd;
    editor.setRangeText(before + editor.value.slice(s, e2) + after, s, e2, 'select');
    editor.focus(); saveActive();
  }
  function insertPrefix(prefix) {
    const s = editor.selectionStart;
    editor.setRangeText(prefix, editor.value.lastIndexOf('\n', s - 1) + 1, editor.value.lastIndexOf('\n', s - 1) + 1, 'end');
    editor.focus(); saveActive();
  }
  editor.addEventListener('keydown', e => {
    const mod = e.metaKey || e.ctrlKey;
    if (mod && e.key === 'b') { e.preventDefault(); wrapSelection('**', '**'); }
    if (mod && e.key === 'i') { e.preventDefault(); wrapSelection('_', '_'); }
    if (e.key === 'Tab') { e.preventDefault(); editor.setRangeText('  ', editor.selectionStart, editor.selectionStart, 'end'); saveActive(); }
  });

  // ── Downloads ─────────────────────────────────────────────
  function getFilename(ext) {
    return (titleEl.value.trim() || 'note').replace(/[^a-z0-9_\-\s]/gi, '').replace(/\s+/g, '-').toLowerCase() + '.' + ext;
  }
  function downloadAs(type) {
    if (!editor.value.trim()) { showToast('Nothing to download yet.'); return; }
    if (type === 'txt') triggerDownload(new Blob([editor.value], { type: 'text/plain' }), getFilename('txt'));
    else if (type === 'md') triggerDownload(new Blob([editor.value], { type: 'text/markdown' }), getFilename('md'));
    else if (type === 'pdf') { generatePDF(editor.value); return; }
    showToast(`Downloaded as ${getFilename(type)}`);
  }
  function triggerDownload(blob, filename) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = filename; a.click(); URL.revokeObjectURL(a.href);
  }
  function generatePDF(content) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'pt', format: 'letter' });
    const margin = 60, pw = doc.internal.pageSize.getWidth(), ph = doc.internal.pageSize.getHeight();
    let y = margin;
    const title = titleEl.value.trim();
    if (title) {
      doc.setFont('helvetica', 'bold'); doc.setFontSize(18); doc.text(title, margin, y); y += 28;
      doc.setDrawColor(180); doc.line(margin, y, pw - margin, y); y += 20;
    }
    doc.setFont('helvetica', 'normal'); doc.setFontSize(11); doc.setLineHeightFactor(1.6);
    const lh = 11 * 1.6;
    doc.splitTextToSize(content, pw - margin * 2).forEach(line => {
      if (y + lh > ph - margin) { doc.addPage(); y = margin; }
      doc.text(line, margin, y); y += lh;
    });
    doc.save(getFilename('pdf'));
    showToast(`Downloaded as ${getFilename('pdf')}`);
  }

  // ── Helpers ───────────────────────────────────────────────
  const escHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  function formatDate(ts) {
    const d = new Date(ts), now = new Date(), diff = (now - d) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400 && d.getDate() === now.getDate()) return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    if (diff < 86400 * 7) return d.toLocaleDateString([], {weekday:'short'});
    return d.toLocaleDateString([], {month:'short', day:'numeric'});
  }
  let toastTimer;
  function showToast(msg) {
    toastEl.textContent = msg; toastEl.classList.add('show');
    clearTimeout(toastTimer); toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400);
  }

  // ── Boot ──────────────────────────────────────────────────
  function boot() {
    // Migrate legacy
    const legacyContent = localStorage.getItem('quillpad_content');
    const legacyTitle   = localStorage.getItem('quillpad_title');
    let notes = loadNotes();
    if (!notes.length) {
      const note = { id: uid(), title: legacyTitle || '', content: legacyContent || '', folderId: null, updatedAt: Date.now() };
      notes = [note]; saveNotes(notes);
      localStorage.removeItem('quillpad_content');
      localStorage.removeItem('quillpad_title');
    }
    // Ensure folderId field on older notes
    let dirty = false;
    notes.forEach(n => { if (!('folderId' in n)) { n.folderId = null; dirty = true; } });
    if (dirty) saveNotes(notes);

    let activeId = getActiveId();
    if (!activeId || !notes.find(n => n.id === activeId)) {
      activeId = [...notes].sort((a, b) => b.updatedAt - a.updatedAt)[0].id;
      setActiveId(activeId);
    }

    const theme = localStorage.getItem('quillpad_theme') || 'dark';
    document.body.dataset.theme = theme; updateThemeIcon(theme);
    const font = localStorage.getItem('quillpad_font') || 'sans';
    document.getElementById('fontSelect').value = font;
    editor.style.fontFamily = FONTS[font];

    renderTree();
    switchNote(activeId);
  }

  boot();
</script>
</body>
</html>
