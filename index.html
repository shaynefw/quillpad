<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quillpad</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --text: #e8e8e8;
      --muted: #666;
      --accent: #7c6af7;
      --accent-hover: #9180ff;
      --btn-bg: #242424;
      --btn-hover: #2f2f2f;
    }

    [data-theme="light"] {
      --bg: #f5f5f4;
      --surface: #ffffff;
      --border: #e0dedd;
      --text: #1c1b1a;
      --muted: #999;
      --accent: #6254e8;
      --accent-hover: #7060f5;
      --btn-bg: #efefef;
      --btn-hover: #e3e3e3;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      transition: background 0.2s, color 0.2s;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0 14px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .wordmark {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .wordmark svg {
      color: var(--accent);
    }

    .wordmark span {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .title-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 0.95rem;
      color: var(--text);
      text-align: center;
      font-weight: 500;
      min-width: 0;
    }

    .title-input::placeholder { color: var(--muted); }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 6px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
    }

    .icon-btn:hover { color: var(--text); background: var(--btn-hover); }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .toolbar-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 5px 8px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      transition: color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .toolbar-btn:hover { color: var(--text); background: var(--btn-hover); }
    .toolbar-btn.active { color: var(--accent); background: var(--btn-bg); }

    .toolbar-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
    }

    select.font-select {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      padding: 5px 6px;
      border-radius: 6px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }

    select.font-select:hover { color: var(--text); background: var(--btn-hover); }

    /* Editor */
    .editor-wrap {
      flex: 1;
      overflow: hidden;
      padding: 20px 0;
    }

    #editor {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: var(--text);
      font-size: 1rem;
      line-height: 1.75;
      padding: 0;
      caret-color: var(--accent);
    }

    #editor::placeholder { color: var(--muted); }

    /* Footer */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0 20px;
      border-top: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }

    .stats {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .download-group {
      display: flex;
      gap: 8px;
    }

    .dl-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--btn-bg);
      color: var(--text);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      letter-spacing: 0.2px;
    }

    .dl-btn:hover {
      background: var(--btn-hover);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .dl-btn:active { transform: translateY(0); }

    .dl-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .dl-btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 0.85rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 600px) {
      .title-input { display: none; }
      .download-group { flex-wrap: wrap; }
      .dl-btn span { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="wordmark">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        <span>Quillpad</span>
      </div>
      <input class="title-input" id="noteTitle" type="text" placeholder="Untitled note…" maxlength="80" />
      <div class="header-actions">
        <button class="icon-btn" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">
          <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <button class="icon-btn" id="clearBtn" title="Clear note" aria-label="Clear note">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/>
            <path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="toolbar">
      <select class="font-select" id="fontSelect" title="Font family">
        <option value="sans">Sans-serif</option>
        <option value="serif">Serif</option>
        <option value="mono">Monospace</option>
      </select>
      <div class="toolbar-divider"></div>
      <button class="toolbar-btn" id="btnBold" title="Bold (⌘B)" onclick="wrapSelection('**','**')"><b>B</b></button>
      <button class="toolbar-btn" id="btnItalic" title="Italic (⌘I)" onclick="wrapSelection('_','_')"><i>I</i></button>
      <button class="toolbar-btn" id="btnCode" title="Inline code" onclick="wrapSelection('`','`')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      </button>
      <div class="toolbar-divider"></div>
      <button class="toolbar-btn" onclick="insertPrefix('# ')">H1</button>
      <button class="toolbar-btn" onclick="insertPrefix('## ')">H2</button>
      <button class="toolbar-btn" onclick="insertPrefix('### ')">H3</button>
      <div class="toolbar-divider"></div>
      <button class="toolbar-btn" onclick="insertPrefix('- ')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        List
      </button>
      <button class="toolbar-btn" onclick="insertPrefix('> ')">Quote</button>
      <button class="toolbar-btn" onclick="insertPrefix('- [ ] ')">Task</button>
    </div>

    <div class="editor-wrap">
      <textarea id="editor" placeholder="Start writing…" spellcheck="true" autofocus></textarea>
    </div>

    <footer>
      <div class="stats" id="stats">0 words &middot; 0 chars</div>
      <div class="download-group">
        <button class="dl-btn" onclick="downloadAs('txt')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>.TXT</span>
        </button>
        <button class="dl-btn" onclick="downloadAs('md')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>.MD</span>
        </button>
        <button class="dl-btn primary" onclick="downloadAs('pdf')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>.PDF</span>
        </button>
      </div>
    </footer>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const editor = document.getElementById('editor');
    const statsEl = document.getElementById('stats');
    const titleEl = document.getElementById('noteTitle');
    const toastEl = document.getElementById('toast');

    const FONTS = {
      sans: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
      serif: 'Georgia, "Times New Roman", serif',
      mono: '"SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace'
    };

    // Persist to localStorage
    function save() {
      localStorage.setItem('quillpad_content', editor.value);
      localStorage.setItem('quillpad_title', titleEl.value);
    }

    function load() {
      editor.value = localStorage.getItem('quillpad_content') || '';
      titleEl.value = localStorage.getItem('quillpad_title') || '';
      const theme = localStorage.getItem('quillpad_theme') || 'dark';
      document.body.dataset.theme = theme;
      updateThemeIcon(theme);
      const font = localStorage.getItem('quillpad_font') || 'sans';
      document.getElementById('fontSelect').value = font;
      editor.style.fontFamily = FONTS[font];
      updateStats();
    }

    editor.addEventListener('input', () => { updateStats(); save(); });
    titleEl.addEventListener('input', save);

    function updateStats() {
      const text = editor.value.trim();
      const words = text ? text.split(/\s+/).length : 0;
      const chars = editor.value.length;
      statsEl.textContent = `${words.toLocaleString()} word${words !== 1 ? 's' : ''} · ${chars.toLocaleString()} char${chars !== 1 ? 's' : ''}`;
    }

    // Font selector
    document.getElementById('fontSelect').addEventListener('change', (e) => {
      editor.style.fontFamily = FONTS[e.target.value];
      localStorage.setItem('quillpad_font', e.target.value);
    });

    // Theme toggle
    document.getElementById('themeToggle').addEventListener('click', () => {
      const next = document.body.dataset.theme === 'light' ? 'dark' : 'light';
      document.body.dataset.theme = next;
      localStorage.setItem('quillpad_theme', next);
      updateThemeIcon(next);
    });

    function updateThemeIcon(theme) {
      const icon = document.getElementById('themeIcon');
      if (theme === 'light') {
        icon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
      } else {
        icon.innerHTML = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
      }
    }

    // Clear
    document.getElementById('clearBtn').addEventListener('click', () => {
      if (!editor.value && !titleEl.value) return;
      if (confirm('Clear note? This cannot be undone.')) {
        editor.value = '';
        titleEl.value = '';
        save();
        updateStats();
        editor.focus();
      }
    });

    // Markdown helpers
    function wrapSelection(before, after) {
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      const selected = editor.value.slice(start, end);
      const replacement = before + selected + after;
      editor.setRangeText(replacement, start, end, 'select');
      editor.focus();
      save();
    }

    function insertPrefix(prefix) {
      const start = editor.selectionStart;
      const lineStart = editor.value.lastIndexOf('\n', start - 1) + 1;
      editor.setRangeText(prefix, lineStart, lineStart, 'end');
      editor.focus();
      save();
    }

    // Keyboard shortcuts
    editor.addEventListener('keydown', (e) => {
      const mod = e.metaKey || e.ctrlKey;
      if (mod && e.key === 'b') { e.preventDefault(); wrapSelection('**', '**'); }
      if (mod && e.key === 'i') { e.preventDefault(); wrapSelection('_', '_'); }
      // Tab inserts 2 spaces
      if (e.key === 'Tab') {
        e.preventDefault();
        const s = editor.selectionStart;
        editor.setRangeText('  ', s, s, 'end');
        save();
      }
    });

    // Downloads
    function getFilename(ext) {
      const title = titleEl.value.trim() || 'note';
      return title.replace(/[^a-z0-9_\-\s]/gi, '').replace(/\s+/g, '-').toLowerCase() + '.' + ext;
    }

    function downloadAs(type) {
      const content = editor.value;
      if (!content.trim()) { showToast('Nothing to download yet.'); return; }

      if (type === 'txt') {
        triggerDownload(new Blob([content], { type: 'text/plain' }), getFilename('txt'));
      } else if (type === 'md') {
        triggerDownload(new Blob([content], { type: 'text/markdown' }), getFilename('md'));
      } else if (type === 'pdf') {
        generatePDF(content);
      }
      showToast(`Downloaded as ${getFilename(type)}`);
    }

    function triggerDownload(blob, filename) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function generatePDF(content) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'pt', format: 'letter' });
      const margin = 60;
      const pageWidth = doc.internal.pageSize.getWidth();
      const maxWidth = pageWidth - margin * 2;
      const title = titleEl.value.trim();
      let y = margin;

      if (title) {
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(18);
        doc.text(title, margin, y);
        y += 28;
        doc.setDrawColor(180);
        doc.line(margin, y, pageWidth - margin, y);
        y += 20;
      }

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(11);
      doc.setLineHeightFactor(1.6);

      const lines = doc.splitTextToSize(content, maxWidth);
      const lineHeight = 11 * 1.6;
      const pageHeight = doc.internal.pageSize.getHeight();

      lines.forEach(line => {
        if (y + lineHeight > pageHeight - margin) {
          doc.addPage();
          y = margin;
        }
        doc.text(line, margin, y);
        y += lineHeight;
      });

      doc.save(getFilename('pdf'));
    }

    // Toast
    let toastTimer;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400);
    }

    load();
  </script>
</body>
</html>
